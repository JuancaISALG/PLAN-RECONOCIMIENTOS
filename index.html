<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Reconocimientos ISEG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0e0f11; --bg2: #15171a; --bg3: #1c1f23;
    --border: #2a2d32; --text: #e8eaed; --accent: #c8f060;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; text-transform: uppercase; margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
  .status-tag { background: var(--bg3); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; color: var(--accent); border: 1px solid var(--accent); font-family: 'DM Mono', monospace; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
  .card { background: var(--bg2); border: 1px solid var(--border); padding: 24px; border-radius: 16px; transition: transform 0.2s; }
  .card:hover { border-color: var(--accent); }
  h3 { font-family: 'Syne', sans-serif; margin-top: 0; color: #8b9099; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
  canvas { width: 100% !important; height: 300px !important; }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard Reconocimientos</h1>
  <div id="loading-status" class="status-tag">CONECTANDO...</div>
</div>

<div class="grid">
  <div class="card">
    <h3>Distribución por Mes</h3>
    <canvas id="chart-mes"></canvas>
  </div>
  <div class="card">
    <h3>Estado de Entrega (Status)</h3>
    <canvas id="chart-status"></canvas>
  </div>
</div>

<script>
let chartMes, chartStatus;

// FUNCIÓN DE INICIO AUTOMÁTICO
async function cargarDashboard() {
  const statusEl = document.getElementById('loading-status');
  
  try {
    // Busca el archivo datos.json en la misma carpeta
    const response = await fetch('datos.json');
    if (!response.ok) throw new Error("Archivo datos.json no encontrado");
    
    const data = await response.json();
    
    statusEl.textContent = `ONLINE - ${data.length} REGISTROS`;
    statusEl.style.color = "#c8f060";
    statusEl.style.borderColor = "#c8f060";

    generarGraficos(data);
  } catch (error) {
    console.error(error);
    statusEl.textContent = "ERROR DE CONEXIÓN";
    statusEl.style.color = "#f06060";
    statusEl.style.borderColor = "#f06060";
  }
}

function generarGraficos(data) {
  const meses = {};
  const estados = {};

  data.forEach(item => {
    // CORRECCIÓN: Usamos exactamente las columnas de tu Excel/JSON
    const m = item["MES DE RECONOCIMIENTO"] || "SIN DATOS";
    meses[m] = (meses[m] || 0) + 1;

    // CORRECCIÓN: Tu columna tiene un espacio al final "STATUS "
    const s = item["STATUS "] || "SIN ESTADO";
    estados[s] = (estados[s] || 0) + 1;
  });

  // Gráfico 1: Meses (Barra)
  const ctxMes = document.getElementById('chart-mes').getContext('2d');
  chartMes = new Chart(ctxMes, {
    type: 'bar',
    data: {
      labels: Object.keys(meses),
      datasets: [{
        label: 'Reconocimientos',
        data: Object.values(meses),
        backgroundColor: '#c8f060',
        borderRadius: 5
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        y: { grid: { color: '#2a2d32' }, ticks: { color: '#8b9099' } },
        x: { ticks: { color: '#8b9099' } }
      }
    }
  });

  // Gráfico 2: Status (Dona)
  const ctxStatus = document.getElementById('chart-status').getContext('2d');
  chartStatus = new Chart(ctxStatus, {
    type: 'doughnut',
    data: {
      labels: Object.keys(estados),
      datasets: [{
        data: Object.values(estados),
        backgroundColor: ['#c8f060', '#8ec8f0', '#333740', '#f06060'],
        borderWidth: 0
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#e8eaed', padding: 20 } }
      },
      cutout: '70%'
    }
  });
}

// Ejecutar al abrir la página
window.onload = cargarDashboard;
</script>
</body>
</html>
